name: 🚀 Auto Deploy Surge
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'

    - name: 📦 Install pnpm + deps
      run: |
        npm install -g pnpm
        pnpm install --frozen-lockfile

    - name: 🔨 Build projet
      run: pnpm run build

    - name: 📤 Deploy Surge
      uses: dswistowski/surge-sh-action@v1
      with:
        domain: 'xtreamflow.surge.sh'   # ton domaine complet
        project: 'dist'                 # ou 'build' selon ton output
        login: ${{ secrets.SURGE_LOGIN }}
        token: ${{ secrets.SURGE_TOKEN }}
